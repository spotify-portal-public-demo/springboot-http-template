apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: springboot-http-template
  title: Spring Boot HTTP Service
  description: Create a simple microservice using HTTP and Spring Boot Java
  tags:
    - recommended
    - java
    - http
spec:
  owner: group:devex
  type: service

  parameters:
    - title: Provide some simple information
      required:
        - component_id
        - owner
        - java_package_name
      properties:
        component_id:
          title: Name
          type: string
          description: Unique name of the component
          ui:field: EntityNamePicker
        java_package_name:
          title: Java Package Name
          type: string
          description: Name for the java package - e.g. (com.spotify.demo.<package>)
        description:
          title: Description
          type: string
          description: Help others understand what this service is for.
        owner:
          title: Owner
          type: string
          description: Owner of the component
          ui:field: OwnerPicker
          ui:options:
            allowedKinds:
              - Group
    - title: Choose a location
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repository Location
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com

  steps:
    - id: template
      name: Fetch Skeleton + Template
      action: fetch:template
      input:
        url: ./skeleton
        copyWithoutRender:
          - .github/workflows/*
        values:
          component_id: ${{ parameters.component_id }}
          description: ${{ parameters.description }}
          artifact_id: ${{ parameters.component_id }}
          java_package_name: ${{ parameters.java_package_name }}
          owner: ${{ parameters.owner }}
          destination: ${{ parameters.repoUrl | parseRepoUrl }}

    - id: publish
      name: Publish
      action: publish:github
      input:
        repoUrl: ${{ parameters.repoUrl }}
        description: This is ${{ parameters.component_id }}
        repoVisibility: public
        defaultBranch: main

    - id: register
      name: Register
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

    - id: flux_fetch
      name: Fetch the Flux repo
      action: fetch:plain
      input:
        url: https://github.com/spotify-portal-public-demo/flux
        targetPath: flux

    - id: flux_template
      name: Add manifest file to Flux repo
      action: fetch:template:file
      input:
        url: https://github.com/spotify-portal-public-demo/flux/blob/main/templates/flux-app.yaml
        targetPath: flux/clusters/demo/apps/${{ parameters.component_id }}.yaml
        values:
          component_id: ${{ parameters.component_id }}
          destination: ${{ parameters.repoUrl | parseRepoUrl }}

    - id: flux_pr
      name: Create Flux PR to enable deployments
      action: publish:github:pull-request
      input:
        repoUrl: github.com?repo=flux&owner=spotify-portal-public-demo
        branchName: scaffolder-${{ parameters.component_id }}
        title: add app ${{ parameters.component_id }}
        description: This PR adds a new Flux manifest for '${{ parameters.component_id }}' which will enable deployments.
        sourcePath: flux

  output:
    links:
      - title: Repository
        url: ${{ steps.publish.output.remoteUrl }}
      - title: Flux PR
        url: ${{ steps.flux_pr.output.remoteUrl }}
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
